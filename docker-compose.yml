version: "3.9"

# Docker Compose for personalcloud — runs MinIO only.
# Database is handled by Neon (managed PostgreSQL with pgvector).
# Use this if STORAGE_BACKEND=minio in your .env

services:
  minio:
    image: minio/minio:latest
    container_name: personalcloud-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  minio_data:
    driver: local
